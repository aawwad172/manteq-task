<div class="login-wrap">
  <p-card header="Sign in" styleClass="login-card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input
          pInputText
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          fluid
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <p-message severity="error" variant="simple" size="small" text="A valid email is required." />
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          inputId="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          autocomplete="current-password"
          fluid
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <p-message severity="error" variant="simple" size="small" text="Password is required." />
        }
      </div>

      <p-button
        type="submit"
        label="Sign in"
        icon="pi pi-sign-in"
        [loading]="loading()"
        fluid
      />
    </form>
  </p-card>
</div>
