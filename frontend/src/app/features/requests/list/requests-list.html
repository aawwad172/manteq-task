<div class="list-header">
  <h2>{{ heading() }}</h2>
  @if (canCreate) {
    <p-button label="New request" icon="pi pi-plus" (onClick)="createNew()" />
  }
</div>

@if (canViewAll) {
  <div class="filter-bar">
    <p-select
      [(ngModel)]="statusFilter"
      [options]="statusOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Status"
      [showClear]="true"
    />
    <p-datepicker
      [(ngModel)]="createdRange"
      selectionMode="range"
      [readonlyInput]="true"
      dateFormat="yy-mm-dd"
      placeholder="Created date range"
      [showButtonBar]="true"
    />
    <p-datepicker
      [(ngModel)]="procedureRange"
      selectionMode="range"
      [readonlyInput]="true"
      dateFormat="yy-mm-dd"
      placeholder="Procedure date range"
      [showButtonBar]="true"
    />
    <p-button label="Apply" icon="pi pi-filter" (onClick)="applyFilters()" />
    <p-button
      label="Clear"
      icon="pi pi-filter-slash"
      severity="secondary"
      [outlined]="true"
      (onClick)="clearFilters()"
    />
  </div>
}

<p-table
  [value]="rows()"
  [lazy]="true"
  (onLazyLoad)="onLazyLoad($event)"
  [paginator]="true"
  [rows]="pageSize()"
  [first]="first()"
  [totalRecords]="total()"
  [loading]="loading()"
  [rowsPerPageOptions]="[10, 20, 50]"
  [rowHover]="true"
  dataKey="id"
  currentPageReportTemplate="{first}–{last} of {totalRecords}"
  [showCurrentPageReport]="true"
>
  <ng-template #header>
    <tr>
      <th>Request #</th>
      <th>Procedure</th>
      <th>Procedure date</th>
      <th>Estimated cost</th>
      <th>Status</th>
      <th></th>
    </tr>
  </ng-template>

  <ng-template #body let-row>
    <tr class="clickable" (click)="openDetail(row)">
      <td>{{ row.requestNumber }}</td>
      <td>{{ row.procedureName }}</td>
      <td>{{ row.procedureDate }}</td>
      <td>{{ row.estimatedCost | number: '1.2-2' }}</td>
      <td><p-tag [value]="row.status" [severity]="statusSeverity(row.status)" /></td>
      <td class="row-actions">
        <p-button
          icon="pi pi-eye"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          (onClick)="openDetail(row)"
          pTooltip="Open"
        />
        @if (canEdit && row.status === 'Draft') {
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            (onClick)="editDraft(row, $event)"
            pTooltip="Edit draft"
          />
        }
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="6">No requests found.</td>
    </tr>
  </ng-template>
</p-table>
